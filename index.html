<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股智能分析终端</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',sans-serif;background:#06080f;color:#c8d0e0;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a2035;border-radius:3px}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #141a2e;border-top-color:#f4a261;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#475569;font-size:13px}
#error-box{display:none;max-width:600px;margin:60px auto;padding:24px;background:#0c1021;border:1px solid #e63946;border-radius:10px;color:#f87171;font-size:13px;line-height:1.7}
.header{border-bottom:1px solid #141a2e;background:rgba(8,11,20,.95);position:sticky;top:0;z-index:100;padding:0 20px}
.header-inner{max-width:1400px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:6px;background:linear-gradient(135deg,#e63946,#f4a261);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.logo-text{font-size:15px;font-weight:700;color:#fff}
.logo-sub{font-size:9px;color:#475569;letter-spacing:1.5px}
.main{max-width:1400px;margin:0 auto;padding:16px 20px}
.btn{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;background:transparent;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#e63946,#f4a261);border:none;color:#fff;font-weight:600}
.btn-primary:hover{opacity:.9}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{border-color:#1e293b;color:#94a3b8}.btn-ghost:hover{border-color:#334155;color:#e2e8f0}
.btn-sm{padding:4px 10px;font-size:11px}
.card{background:#0c1021;border:1px solid #141a2e;border-radius:10px;padding:14px}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:16px}
.market-card .label{font-size:10px;color:#475569;margin-bottom:3px}
.market-card .val{font-size:15px;font-weight:700;color:#fff}
.market-card .chg{font-size:11px;margin-top:2px}
.up{color:#e63946}.down{color:#22c55e}
.search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:8px 14px;border-radius:8px;border:1px solid #1e293b;background:#0c1021;color:#e2e8f0;font-size:14px;outline:none;font-family:inherit}
.search-input:focus{border-color:#e63946}.search-input::placeholder{color:#334155}
.stock-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.stock-tab{flex-shrink:0;padding:6px 14px;border-radius:7px;font-size:13px;border:1px solid #141a2e;background:#0c1021;color:#64748b;cursor:pointer;transition:all .25s}
.stock-tab:hover{color:#c8d0e0}.stock-tab.active{background:linear-gradient(135deg,rgba(230,57,70,.12),rgba(244,162,97,.08));border-color:rgba(230,57,70,.35);color:#fff}
.stock-tab .rm{font-size:14px;color:#475569;cursor:pointer;margin-left:6px}.stock-tab .rm:hover{color:#e63946}
.content-grid{display:grid;gap:14px;grid-template-columns:1fr}
.content-grid.with-ai{grid-template-columns:5fr 3fr}
@media(max-width:1024px){.content-grid.with-ai{grid-template-columns:1fr}}
.price-meta{display:flex;gap:14px;margin-top:5px;font-size:11px;color:#475569;flex-wrap:wrap}
.chart-box{width:100%;height:380px;position:relative}
.chart-tabs{display:flex;gap:3px;background:#080b14;border-radius:7px;padding:3px;width:fit-content;border:1px solid #141a2e;margin-bottom:10px}
.chart-tab{padding:4px 12px;border-radius:5px;font-size:11px;background:transparent;border:none;color:#475569;cursor:pointer;font-family:inherit}
.chart-tab:hover{color:#c8d0e0}.chart-tab.active{background:#141a2e;color:#fff}
.ai-panel{display:flex;flex-direction:column;gap:10px}
.ai-loading{text-align:center;padding:40px;color:#475569}
.signal-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;border:1px solid;font-size:11px;font-weight:500;white-space:nowrap}
.signal-badge.bullish{background:rgba(230,57,70,.12);color:#f87171;border-color:rgba(230,57,70,.25)}
.signal-badge.neutral{background:rgba(244,162,97,.12);color:#f4a261;border-color:rgba(244,162,97,.25)}
.signal-badge.caution{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.25)}
.section-label{font-size:11px;font-weight:700;color:#475569;margin-bottom:6px;letter-spacing:.8px}
.summary-text{font-size:13px;color:#94a3b8;line-height:1.7}
.suggestion-card{background:linear-gradient(135deg,rgba(244,162,97,.04),rgba(230,57,70,.04));border:1px solid rgba(244,162,97,.15);border-radius:10px;padding:14px}
.disclaimer{font-size:10px;color:#1e293b;margin-top:10px}
.gauge-wrap{display:flex;justify-content:center;padding:8px 0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#0c1021;border:1px solid #1e293b;border-radius:12px;padding:24px;max-width:480px;width:90%}
.modal h2{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
.modal label{font-size:12px;color:#64748b;display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:8px 12px;border-radius:6px;border:1px solid #1e293b;background:#080b14;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit}
.modal input:focus{border-color:#e63946}
.modal .note{font-size:11px;color:#334155;margin-top:4px;line-height:1.5}
.empty-state{text-align:center;padding:80px 20px;color:#334155}
.empty-state h3{font-size:18px;color:#475569;margin-bottom:8px}
.empty-state p{font-size:13px;max-width:420px;margin:0 auto;line-height:1.6}
.footer{border-top:1px solid #0e1225;padding:14px 20px;text-align:center;font-size:11px;color:#1e293b}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){.market-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
